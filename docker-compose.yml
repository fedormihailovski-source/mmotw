services:
  db:
    image: mariadb:10.11
    container_name: mmotw-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mmotw}
      MYSQL_USER: ${MYSQL_USER:-mmotw}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mmotw_secure_pass_2026}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mmotw_root_pass_2026}
    volumes:
      - ./db-data:/var/lib/mysql
    ports:
      - '127.0.0.1:3307:3306'
    networks:
      - mmotw-net
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    image: wordpress:6.7-php8.2-fpm
    container_name: mmotw-wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-mmotw}
      WORDPRESS_DB_USER: ${MYSQL_USER:-mmotw}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-mmotw_secure_pass_2026}
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - ./wordpress:/var/www/html
      - ./php-custom.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - mmotw-net

  nginx:
    image: nginx:alpine
    container_name: mmotw-nginx
    restart: unless-stopped
    depends_on:
      - wordpress
    volumes:
      - ./wordpress:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '127.0.0.1:8600:80'
    networks:
      - mmotw-net

networks:
  mmotw-net:
    driver: bridge
